# Managed by jabali-terminal. Included from the panel vhost (panel install step).
# Bridges WSS from the browser to the daemon's unix socket.

location /terminal-ws {
    proxy_pass http://unix:/run/jabali-terminal/jabali-terminal.sock:/terminal/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;

    # SEC-REV-6: proxy_set_header unconditionally OVERWRITES any client-sent
    # X-Real-IP header (nginx does not merge headers). The daemon's
    # IP-bind verification trusts this header — do NOT remove or reorder.
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Match the daemon's hard session cap (SEC-REV-9).
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
