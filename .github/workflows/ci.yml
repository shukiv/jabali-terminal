name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck install.sh

  pytest:
    name: daemon tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install daemon (editable)
        run: |
          if [ -f daemon/pyproject.toml ]; then
            python -m pip install --upgrade pip
            pip install -e "daemon/[dev]"
          else
            echo "daemon/pyproject.toml not present yet (pre-Step 3 scaffold)"
          fi
      - name: Run pytest
        # cd into daemon so pytest picks up daemon/pyproject.toml (needed
        # for asyncio_mode = "auto" that drives the async-fixture tests).
        run: |
          if [ -d daemon/tests ]; then
            cd daemon && pytest tests -q
          else
            echo "daemon/tests not present yet (pre-Step 3 scaffold)"
          fi

  php-lint:
    name: php -l panel/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Lint PHP files
        run: |
          if compgen -G "panel/**/*.php" > /dev/null; then
            find panel -name '*.php' -print0 | xargs -0 -n1 php -l
          else
            echo "panel/*.php not present yet (pre-Step 5 scaffold)"
          fi
