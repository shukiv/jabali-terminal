name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tarball:
    name: Build standalone tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tarball=jabali-terminal-${version}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Build tarball
        env:
          TARBALL: ${{ steps.version.outputs.tarball }}
        run: |
          set -euo pipefail
          out_dir="/tmp/jabali-terminal-pkg"
          mkdir -p "$out_dir"
          tar --exclude='.git' \
              --exclude='.github' \
              --exclude='tests' \
              --exclude='__pycache__' \
              --exclude='.pytest_cache' \
              -czf "$out_dir/$TARBALL" \
              install.sh CLAUDE.md README.md LICENSE \
              $( [ -d daemon ] && echo daemon ) \
              $( [ -d panel ] && echo panel ) \
              $( [ -d configs ] && echo configs ) \
              $( [ -d completions ] && echo completions ) \
              $( [ -d docs ] && echo docs )
          (cd "$out_dir" && sha256sum "$TARBALL" > "$TARBALL.sha256")

      - name: Extract release notes from CHANGELOG
        id: notes
        # Release notes come from the CHANGELOG.md section that matches the
        # tag being pushed, not from auto-generated commit lists. Rationale:
        # CHANGELOG sections are curated, grouped (Added/Changed/Security/
        # Fixed), and can be edited in the same PR that lands the change —
        # i.e. review happens before the tag, not after. A release without
        # a matching CHANGELOG section is a tagging mistake: the job fails
        # loudly instead of silently falling back to commit titles.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          notes_file="/tmp/jabali-terminal-pkg/release-notes.md"
          # Extract everything between `## [VERSION]` and the next `## [`
          # heading (exclusive). $VERSION came via env (never interpolated
          # into the script body) so the awk pattern can't be injected.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; print; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file"
          # Trim trailing blank lines so the release page doesn't render a
          # big gap at the bottom.
          sed -i -e :a -e '/^$/{$d;N;ba' -e '}' "$notes_file"
          if [ ! -s "$notes_file" ]; then
            echo "::error::No '## [${VERSION}]' section found in CHANGELOG.md."
            echo "::error::Before tagging v${VERSION}, promote the [Unreleased]"
            echo "::error::section to [${VERSION}] and commit it."
            exit 1
          fi
          echo "--- release notes preview (first 20 lines) ---"
          head -20 "$notes_file"
          echo "notes_path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/jabali-terminal-pkg/${{ steps.version.outputs.tarball }}
            /tmp/jabali-terminal-pkg/${{ steps.version.outputs.tarball }}.sha256
          body_path: ${{ steps.notes.outputs.notes_path }}
